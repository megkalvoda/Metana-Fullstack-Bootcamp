<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suggested Task Component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Styles/suggestedTaskComponent.css" />
</head>
<body>

  <!-- ============ Suggested Task Card ============ -->
  <article class="suggested-card">
    <span class="context"><span class="dot"></span> Suggested · Happy &amp; Sunny</span>

    <h3>Take a walk outside</h3>
    <p>The weather is great and your mood is up — a short walk could keep the energy going.</p>

    <div class="row">
      <span class="tag">☀️ Good for sunny days</span>
      <button class="add-btn" type="button">Add to my tasks</button>
    </div>

    <span class="glyph" aria-hidden="true">🚶</span>
  </article>

</body>
</html>
