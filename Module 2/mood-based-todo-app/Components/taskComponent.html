<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Styles/tasksComponent.css" />
</head>
<body>

  <!-- ============ Reusable Task Card ============ -->
  <article class="task-card">
    <span class="check" role="button" aria-label="Mark complete"></span>

    <div class="body">
      <h3>Finish wireframe review</h3>
      <p class="desc">Go through the team's feedback and tidy up the spacing on the dashboard.</p>
      <span class="due">Due today</span>

      <div class="task-actions">
        <button type="button" class="edit">Edit</button>
        <button type="button" class="complete">Complete</button>
        <button type="button" class="delete">Delete</button>
      </div>
    </div>
  </article>

</body>
</html>
