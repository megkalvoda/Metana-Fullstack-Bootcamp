<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a Task</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Styles/taskCreationForm.css" />
</head>
<body>

  <!-- ============ Create a Task Form ============ -->
  <form class="form-card" autocomplete="off">
    <h2>Create a task</h2>
    <p class="sub">Add something to your list for today.</p>

    <div class="field">
      <label for="title">Task title</label>
      <input id="title" name="title" type="text" placeholder="e.g. Finish the design review" required />
    </div>

    <div class="field">
      <label for="desc">Description <span class="opt">(optional)</span></label>
      <textarea id="desc" name="description" placeholder="Add any extra details…"></textarea>
    </div>

    <div class="field">
      <label for="due">Due date</label>
      <input id="due" name="dueDate" type="date" />
    </div>

    <button class="submit" type="submit">Add task</button>
  </form>

</body>
</html>
