<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Selector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500..700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../Styles/moodSelecter.css" />
</head>
<body>

  <!-- ============ Mood Selector ============
       A button group built from radio inputs so only one
       mood can be chosen at a time. -->
  <form class="mood-card">
    <h2>How are you feeling?</h2>
    <p class="sub">We'll suggest tasks that fit your mood.</p>

    <div class="mood-group" role="radiogroup" aria-label="Select your mood">
      <input type="radio" id="happy" name="mood" value="happy" checked />
      <label for="happy">
        <span class="emoji">😊</span>
        <span class="name">Happy</span>
      </label>

      <input type="radio" id="neutral" name="mood" value="neutral" />
      <label for="neutral">
        <span class="emoji">😐</span>
        <span class="name">Neutral</span>
      </label>

      <input type="radio" id="sad" name="mood" value="sad" />
      <label for="sad">
        <span class="emoji">😔</span>
        <span class="name">Sad</span>
      </label>
    </div>

    <button class="confirm" type="submit">Set my mood</button>
  </form>

</body>
</html>
